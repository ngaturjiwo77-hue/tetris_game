name: Build Tetris APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq python3-pip build-essential git python3-dev libffi-dev libssl-dev libncurses5-dev zlib1g-dev libreadline-dev libbz2-dev libsqlite3-dev openjdk-11-jdk zip unzip autoconf libtool pkg-config cmake
        pip install --upgrade pip setuptools wheel
        pip install cython buildozer
    
    - name: Create Buildozer spec
      run: |
        cat > buildozer.spec << 'ENDSPEC'
        [app]
        title = Tetris Game
        package.name = tetrisgame
        package.domain = org.tetris
        source.dir = .
        source.include_exts = py
        version = 1.0
        requirements = python3,kivy==2.1.0
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET
        android.api = 30
        android.minapi = 21
        android.ndk = 25b
        android.sdk = 30
        android.arch = armeabi-v7a
        
        [buildozer]
        log_level = 2
        warn_on_root = 0
        ENDSPEC
    
    - name: Build APK
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        buildozer android debug
      timeout-minutes: 60
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Tetris-APK
        path: bin/*.apk
        retention-days: 90
