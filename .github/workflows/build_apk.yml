name: Build Tetris APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq python3-pip build-essential git python3-dev libffi-dev libssl-dev libncurses5-dev zlib1g-dev libreadline-dev libbz2-dev libsqlite3-dev openjdk-11-jdk zip unzip autoconf libtool pkg-config cmake wget
    
    - name: Install Python packages
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install cython buildozer
    
    - name: Setup Android SDK
      run: |
        ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_HOME
        
        # Download command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        # Setup cmdline-tools
        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        
        # BIKIN SYMLINK - ini kuncinya!
        mkdir -p $ANDROID_HOME/tools/bin
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $ANDROID_HOME/tools/bin/avdmanager
        
        # Accept licenses & install SDK
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-30" "build-tools;30.0.3"
    
    - name: Build APK
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        buildozer android debug
      timeout-minutes: 90
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Tetris-APK
        path: bin/*.apk
        retention-days: 90
