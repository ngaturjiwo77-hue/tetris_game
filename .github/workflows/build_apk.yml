name: Build Tetris APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          python3-pip \
          build-essential \
          git \
          python3-dev \
          libffi-dev \
          libssl-dev \
          libncurses5-dev \
          zlib1g-dev \
          libreadline-dev \
          libbz2-dev \
          libsqlite3-dev \
          openjdk-11-jdk \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          cmake
    
    - name: Install Python packages
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install cython buildozer
    
    - name: Clean Buildozer cache
      run: |
        rm -rf ~/.buildozer
        rm -rf .buildozer
    
    - name: Build APK
      run: |
        # Biarkan Buildozer download SDK sendiri
        buildozer android debug
      timeout-minutes: 90
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Tetris-APK
        path: bin/*.apk
        retention-days: 90
    
    - name: Upload build log if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: .buildozer/android/platform/*.log
        retention-days: 7
